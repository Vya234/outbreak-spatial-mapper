<!DOCTYPE html>
<html>
<head>
    <title>Outbreak Spatial Footprint</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map
        var map = L.map('map').setView([22.314, 87.310], 14);

        // 2. Add the free OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Simulated Outbreak Data (Lat, Lng)
        var outbreakCases = [
            [22.3149, 87.3105], 
            [22.3155, 87.3151], 
            [22.3121, 87.3120], 
            [22.3160, 87.3110],
            [22.3135, 87.3135]
        ];

        // Plot individual cases as red dots
        outbreakCases.forEach(function(coord) {
            L.circleMarker(coord, {
                color: 'red',
                radius: 5,
                fillOpacity: 0.8
            }).bindPopup("Simulated Case").addTo(map);
        });

        // 4. JavaScript Convex Hull Algorithm (Monotone Chain)
        function getConvexHull(points) {
            // Create a copy and sort by Longitude (x), then Latitude (y)
            let sorted = points.slice().sort((a, b) => a[1] === b[1] ? a[0] - b[0] : a[1] - b[1]);
            
            if (sorted.length <= 1) return sorted;

            // Cross product to determine turn direction
            const cross = (o, a, b) => {
                return (a[1] - o[1]) * (b[0] - o[0]) - (a[0] - o[0]) * (b[1] - o[1]);
            };

            // Build lower hull
            let lower = [];
            for (let p of sorted) {
                while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) {
                    lower.pop();
                }
                lower.push(p);
            }

            // Build upper hull
            let upper = [];
            for (let i = sorted.length - 1; i >= 0; i--) {
                let p = sorted[i];
                while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) {
                    upper.pop();
                }
                upper.push(p);
            }

            lower.pop();
            upper.pop();
            return lower.concat(upper);
        }

        // 5. Calculate and draw the spatial footprint
        var hullCoordinates = getConvexHull(outbreakCases);

        var outbreakZone = L.polygon(hullCoordinates, {
            color: '#ff0000',
            weight: 2,
            fillColor: '#ff0000',
            fillOpacity: 0.2
        }).addTo(map);

        // 6. Auto-zoom map to fit the outbreak zone perfectly
        map.fitBounds(outbreakZone.getBounds());
    </script>
</body>
</html>
