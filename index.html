<!DOCTYPE html>
<html>
<head>
    <title>Outbreak Spatial Footprint</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100%; }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            width: 250px;
        }
        .stat-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            text-align: center;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <div id="controls">
        <h3 style="margin-top: 0; text-align: center;">Outbreak Tracker</h3>
        <p style="font-size: 12px; color: #555;">Click map to log a case. Drag pins to update.</p>
        
        <div class="stat-box">
            <div style="font-size: 12px; color: #666;">Active Cases</div>
            <div id="caseCount" class="stat-value" style="color: #333;">0</div>
        </div>
        
        <div class="stat-box">
            <div style="font-size: 12px; color: #666;">Threat Level</div>
            <div id="threatLevel" class="stat-value">None</div>
        </div>

        <button id="clearBtn">Clear All Cases</button>
    </div>
    
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.314, 87.310], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var defaultCases = [
            [22.3149, 87.3105], [22.3155, 87.3151], [22.3121, 87.3120], 
            [22.3160, 87.3110], [22.3135, 87.3135]
        ];

        var savedData = localStorage.getItem('outbreakTrackerData');
        var activeCases = savedData ? JSON.parse(savedData) : defaultCases;
        var markers = [];
        var outbreakZone = null;

        function getConvexHull(points) {
            let sorted = points.slice().sort((a, b) => a[1] === b[1] ? a[0] - b[0] : a[1] - b[1]);
            if (sorted.length <= 1) return sorted;
            const cross = (o, a, b) => (a[1] - o[1]) * (b[0] - o[0]) - (a[0] - o[0]) * (b[1] - o[1]);
            let lower = [];
            for (let p of sorted) {
                while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
                lower.push(p);
            }
            let upper = [];
            for (let i = sorted.length - 1; i >= 0; i--) {
                let p = sorted[i];
                while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
                upper.push(p);
            }
            lower.pop(); upper.pop();
            return lower.concat(upper);
        }

        function updateSpatialFootprint() {
            var currentPoints = markers.map(m => [m.getLatLng().lat, m.getLatLng().lng]);
            localStorage.setItem('outbreakTrackerData', JSON.stringify(currentPoints));

            let caseCount = currentPoints.length;
            document.getElementById('caseCount').innerText = caseCount;

            // DYNAMIC SEVERITY LOGIC
            let polyColor = '#28a745'; // Green default
            let threatText = "Monitoring";
            let threatColor = '#28a745';

            if (caseCount >= 10) {
                polyColor = '#dc3545'; // Red
                threatText = "Critical";
                threatColor = '#dc3545';
            } else if (caseCount >= 5) {
                polyColor = '#fd7e14'; // Orange
                threatText = "Escalated";
                threatColor = '#fd7e14';
            } else if (caseCount >= 3) {
                polyColor = '#ffc107'; // Yellow
                threatText = "Warning";
                threatColor = '#ffc107';
            } else {
                threatText = "Insufficient Data";
                threatColor = '#6c757d';
            }

            document.getElementById('threatLevel').innerText = threatText;
            document.getElementById('threatLevel').style.color = threatColor;

            if (outbreakZone) {
                map.removeLayer(outbreakZone);
                outbreakZone = null;
            }

            var hullCoordinates = getConvexHull(currentPoints);

            if (hullCoordinates.length >= 3) {
                outbreakZone = L.polygon(hullCoordinates, {
                    color: polyColor,
                    weight: 2,
                    fillColor: polyColor,
                    fillOpacity: 0.25
                }).addTo(map);
            }
        }

        function createMarker(coord) {
            var marker = L.marker(coord, { draggable: true }).addTo(map);
            marker.on('drag', updateSpatialFootprint);
            markers.push(marker);
        }

        activeCases.forEach(createMarker);

        map.on('click', function(e) {
            createMarker([e.latlng.lat, e.latlng.lng]);
            updateSpatialFootprint();
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (outbreakZone) {
                map.removeLayer(outbreakZone);
                outbreakZone = null;
            }
            localStorage.removeItem('outbreakTrackerData');
            updateSpatialFootprint();
        });

        updateSpatialFootprint();
        if (outbreakZone) {
            map.fitBounds(outbreakZone.getBounds(), { padding: [50, 50] });
        }
    </script>
</body>
</html>
